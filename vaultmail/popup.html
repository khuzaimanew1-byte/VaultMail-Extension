<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultMail</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header 1: App Identity ── -->
  <header class="app-header">
    <div class="app-brand">
      <div class="app-logo">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="20" height="20" rx="5.5" fill="#3B82F6"/>
          <rect x="3.5" y="5.5" width="13" height="9" rx="1.75" stroke="white" stroke-width="1.4"/>
          <path d="M3.5 7.5L10 11.5L16.5 7.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="app-brand-name">VaultMail</span>
    </div>
    <button class="btn-settings" aria-label="Settings">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="7.5" cy="7.5" r="2.2" stroke="currentColor" stroke-width="1.3"/>
        <path d="M7.5 1.5V2.8M7.5 12.2V13.5M1.5 7.5H2.8M12.2 7.5H13.5M3.2 3.2L4.1 4.1M10.9 10.9L11.8 11.8M3.2 11.8L4.1 10.9M10.9 4.1L11.8 3.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <!-- ── Header 2: Workspace Bar ── -->
  <div class="workspace-bar">
    <div class="workspace-brand">
      <!-- Official Replit mark -->
      <svg class="replit-mark" width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0"  width="7" height="5" rx="1" fill="#F26207"/>
        <rect x="7" y="5"  width="7" height="6" rx="1" fill="#F26207"/>
        <rect x="0" y="11" width="7" height="5" rx="1" fill="#F26207"/>
      </svg>
      <span class="workspace-label">Replit</span>
    </div>
    <button class="btn-add" id="btnAdd" aria-label="Add emails">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 1V11M1 6H11" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- ── Main Scroll Area ── -->
  <main class="content" id="content">

    <!-- Stats -->
    <div class="stats-row" id="statsRow" style="display:none">
      <span class="stat-number" id="statCount">0</span>
      <span class="stat-label">Emails</span>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="9" width="34" height="26" rx="5" stroke="rgba(255,255,255,0.1)" stroke-width="1.6"/>
          <path d="M5 15.5L22 26L39 15.5" stroke="rgba(255,255,255,0.1)" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="empty-title">No Emails Saved</p>
      <p class="empty-desc">Store and organize your email collection.</p>
      <button class="btn-empty-cta" id="btnEmptyCta">Add Emails</button>
    </div>

    <!-- Email Grid -->
    <div class="email-grid" id="emailGrid"></div>

  </main>

  <!-- ── Add Modal ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" id="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add Emails</h2>
        <button class="btn-close" id="btnClose" aria-label="Close">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <textarea
        id="emailInput"
        class="email-textarea"
        placeholder="Enter emails separated by commas or new lines&#10;&#10;john@example.com&#10;alex@example.com"
        rows="6"
        spellcheck="false"
        autocomplete="off"
      ></textarea>
      <button class="btn-save" id="btnSave">Save Emails</button>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
